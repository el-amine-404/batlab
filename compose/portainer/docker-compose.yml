name: ${PORTAINER_PROJECT_NAME}
services:
  portainer-ce:
    container_name: portainer-ce
    image: ${IMAGE_PORTAINER_CE}:${TAG_PORTAINER_CE}
    restart: unless-stopped
    ports:
      - ${HOST_LOOPBACK_IP}:${PORTAINER_HTTPS_PORT}:9443
      - ${HOST_LOOPBACK_IP}:${PORTAINER_LEGACY_HTTP_PORT}:9000
    volumes:
      - ${VOLUMES_ROOT}/portainer:/data
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - home_server
    environment:
      - TZ=${TZ}
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  home_server:
    external: true
    name: home_server
