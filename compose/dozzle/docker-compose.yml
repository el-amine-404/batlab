services:
  dozzle:
    image: ${IMAGE_DOZZLE}:${TAG_DOZZLE}
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - ${HOST_LOOPBACK_IP}:${DOZZLE_PORT}:8080
    environment:
      - DOZZLE_ENABLE_ACTIONS=true
      - DOZZLE_ENABLE_SHELL=true
    networks:
      - home_server
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  home_server:
    external: true
    name: home_server
