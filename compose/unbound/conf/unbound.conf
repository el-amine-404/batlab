# https://github.com/MatthewVance/unbound-docker/blob/master/unbound.conf
server:
    # Basic Networking
    interface: 0.0.0.0
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes

    # Security: Access Control (Only allow your local & Docker ranges)
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: 10.0.0.0/8 allow

    # Privacy Settings (Hide from snooping)
    hide-identity: yes
    hide-version: yes

    # Advanced Privacy: QNAME Minimisation
    # Only sends the minimum info needed to each level of DNS
    qname-minimisation: yes

    # Security: DNSSEC Validation
    # The mvance image manages the root.key automatically
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/var/root.key"
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes # Protects against "birthday attacks"

    # Performance & Optimization
    prefetch: yes # Refresh popular records automatically
    num-threads: 1 # Sufficient for home use; prevents overhead
    msg-cache-size: 32m
    rrset-cache-size: 64m

    # Clean logs
    verbosity: 2
    use-syslog: no

    # The MatthewVance image stores certs at this path by default
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"


forward-zone:
    name: "."
    forward-tls-upstream: yes

    # Quad9 (Primary & Secondary)
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net

    # Cloudflare (Optional Backup)
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com
