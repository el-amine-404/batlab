name: ${FILE_BROWSER_PROJECT_NAME}
services:
  filebrowser:
    image: ${IMAGE_FILEBROWSER}:${TAG_FILEBROWSER}
    container_name: filebrowser
    restart: always
    user: "${PUID}:${PGID}"
    volumes:
      - ${CONFIGS_ROOT}/filebrowser/conf/settings.json:/config/settings.json:ro
      - ${VOLUMES_ROOT}/filebrowser:/database
      - /mnt:/srv:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${HOST_LOOPBACK_IP}:${FILE_BROWSER_HTTP_PORT}:80
    networks:
      - home_server
    read_only: true
    tmpfs:
      - /run:uid=${PUID},gid=${PGID},exec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
networks:
  home_server:
    external: true
    name: home_server
